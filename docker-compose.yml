version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_cp_postgres
    environment:
      POSTGRES_USER: agent_cp
      POSTGRES_PASSWORD: agent_cp_pass
      POSTGRES_DB: agent_control_plane
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_cp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agent_cp_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
